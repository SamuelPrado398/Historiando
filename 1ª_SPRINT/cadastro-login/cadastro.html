<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            background-color:beige;
            justify-content: center;
            display: flex;
            min-height: 100px;

        }

        .cadastro {
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.473);
            background-color: white ;
        }

        .cadastro label {
            display: block;
            margin-bottom: 5px;
        }

        .cadastro input[type="text"],
        .cadastro input[type="email"],
        .cadastro input[type="password"] {
            width: 95%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
            
        }

        .cadastro input[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: 0.7s;
        }

        .cadastro input[type="submit"]:hover {
            background-color: #2f8733;
            transform: scale(1.04);
            transition: 0.7s;
        }
        
        .titulo{
            text-align: center;
            color: #4CAF50;
        }

        label[for="nome"],
        label[for="email"],
        label[for="senha"]{
            color: #4CAF50;
        }

        .login{
            text-align: center;
        }


    </style>

</head>
<body>
    <div class="cadastro">
        <h2 class="titulo">CADASTRO</h2>
        <hr style="border: 1px solid #4CAF50; margin-bottom: 20px;">
        <form action="cadastro.php" method="post">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome_usuario" required>
            <br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email_usuario" required>
            <br>
            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha_usuario" required>
            <br><br>
            <input type="submit" value="Cadastrar">
        </form>
        <br>
        <p class="login">Já tem uma conta? <a href="login.html">Faça login</a></p>
    </div>
    
</body>
</html>
