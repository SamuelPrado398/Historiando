<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
    body {
        font-family: Arial, sans-serif;

        <nav><a href="listar.php">Lista de Atividades Escolares</a></nav>
